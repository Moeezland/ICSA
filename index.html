<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immigration & Civil Status Authority</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-checking">

  <!-- 🔷 HEADER -->
  <header class="app-header">
    <div class="header-left">
      <img src="logo.png" alt="Logo" class="logo" />
      <h1>Immigration & Civil Status Authority</h1>
    </div>

    <div class="header-right">
      <button id="menuBtn" class="menu-btn">
        ☰
      </button>
    </div>
  </header>

  <!-- 🔽 DROPDOWN MENU (for later options) -->
<div id="menuDropdown" class="menu-dropdown hidden">
  <p>Citizens (current)</p>
  <p onclick="location.href='add-person.html'" class="menu-item">➕ Add Person</p>
  <p>Settings (later)</p>
  <p onclick="logoutOfficer()" class="menu-item">🚪 Logout</p>
</div>

  <!-- 🧠 MAIN CONTENT -->
  <main class="main-content">

    <!-- 🔍 Search Section -->
    <section class="search-section">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search by e-Border number..." 
      />
      <button id="searchBtn">Search</button>
    </section>

    <!-- 📄 Result Section -->
    <section id="resultSection" class="result-section hidden">
      <h2>Person's Profile</h2>
      <div id="profileCard" class="profile-card"></div>
    </section>

  </main>

  <script type="module" src="firebase.js"></script>
  <script>
    // Toggle menu
    const menuBtn = document.getElementById("menuBtn");
    const dropdown = document.getElementById("menuDropdown");

    menuBtn.addEventListener("click", () => {
      dropdown.classList.toggle("hidden");
    });
  </script>

</body>
</html>
